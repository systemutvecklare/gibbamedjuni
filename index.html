<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jubby</title>
    <style>
      /* Ta bort marginal så spelet får hela fönstret */
      body {
        margin: 0;
      }

      /* Mobilknappar — gömda som standard (visas bara på touch-skärmar) */
      #mobile-controls {
        display: none;
      }

      /* Touch-skärmar (mobil/surfplatta): visa knapparna */
      @media (pointer: coarse) {
        #mobile-controls {
          display: block;
          position: fixed;
          bottom: 20px;
          left: 0;
          right: 0;
          pointer-events: none; /* själva lådan tar inte tryck, bara knapparna */
        }

        #mobile-controls button {
          position: absolute;
          bottom: 0;
          width: 80px;
          height: 80px;
          font-size: 36px;
          border: 3px solid #333;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.7);
          color: #222;
          pointer-events: auto; /* knapparna fångar tryck */
          user-select: none;
          -webkit-user-select: none;
          touch-action: manipulation; /* slipp dubbeltryck-zoom */
        }

        /* Vänster och höger på vänster sida av skärmen (för vänster tumme) */
        #btn-left  { left: 20px; }
        #btn-right { left: 110px; }

        /* Hopp på höger sida (för höger tumme) */
        #btn-jump  { right: 20px; }
      }
    </style>
  </head>
  <body>
    <!-- Mobilknappar — syns bara på touch-skärmar (se CSS ovan) -->
    <div id="mobile-controls">
      <button id="btn-left" aria-label="Vänster">←</button>
      <button id="btn-right" aria-label="Höger">→</button>
      <button id="btn-jump" aria-label="Hoppa">↑</button>
    </div>

    <!-- Kaboom är spelbiblioteket — vi laddar in det från internet -->
    <script src="https://unpkg.com/kaboom@3000.1.17/dist/kaboom.js"></script>

    <script>
      // Starta Kaboom — det skapar en "canvas" (ritplatta) som täcker hela sidan
      // (utan width/height fyller den hela webbläsarfönstret)
      // Skala ner på smala skärmar så hela banan får plats (banan är 800 px bred)
      const screenWidth = window.innerWidth;
      const gameScale = screenWidth < 800 ? screenWidth / 800 : 1;
      kaboom({
        background: [135, 206, 235], // himmelsblå bakgrund (R, G, B)
        scale: gameScale,            // 1 = full storlek, mindre = utzoomat
      });

      // Ladda applåd-ljudet från Googles gratis ljudbibliotek
      loadSound("applause", "https://actions.google.com/sounds/v1/crowds/applause.ogg");

      // Sätt tyngdkraft — högre siffra = drar neråt snabbare
      setGravity(1100);


      // ===== HJÄLP-FUNKTION: lägg till hela banan =====
      // Funktion = ett eget kommando vi själva uppfunnit.
      // När vi skriver "buildLevel()" händer allt som står här inne.
      // Banan är designad för en bredd på 800 pixlar. När fönstret är bredare
      // än så centrerar vi hela layouten genom att lägga till offsetX till
      // varje X-position. Marken täcker alltid hela fönstret separat.
      const LEVEL_WIDTH = 800;
      function levelOffsetX() {
        return (width() - LEVEL_WIDTH) / 2;
      }

      // Alla saker som byggs här får taggen "level" så vi kan riva och
      // bygga om dem som en grupp när fönstret ändrar storlek.
      function buildLevel() {
        const offsetX = levelOffsetX();

        // Marken — täcker hela bredden av fönstret så man kan gå överallt
        add([
          rect(width(), 40),
          pos(0, height() - 40),
          color(80, 50, 20),
          area(),
          body({ isStatic: true }),
          "level",
        ]);

        // Plattform 1 — låg, till vänster
        add([
          rect(140, 10),
          pos(200 + offsetX, height() - 130),
          color(220, 140, 70),
          area(),
          body({ isStatic: true }),
          "level",
        ]);

        // Plattform 2 — mitten, lite högre upp
        add([
          rect(140, 10),
          pos(450 + offsetX, height() - 230),
          color(220, 140, 70),
          area(),
          body({ isStatic: true }),
          "level",
        ]);

        // Plattform 3 — högst upp, mitten
        add([
          rect(140, 10),
          pos(220 + offsetX, height() - 330),
          color(220, 140, 70),
          area(),
          body({ isStatic: true }),
          "level",
        ]);

        // Plattform 4 — högst upp, till höger
        add([
          rect(140, 10),
          pos(13 + offsetX, height() - 430),
          color(220, 140, 70),
          area(),
          body({ isStatic: true }),
          "level",
        ]);

        // Plattform 5
        add([
          rect(140, 10),
          pos(300 + offsetX, height() - 510),
          color(220, 140, 70),
          area(),
          body({ isStatic: true }),
          "level",
        ]);

        // Plattform 6
        add([
          rect(200, 10),
          pos(500 + offsetX, height() - 610),
          color(220, 140, 70),
          area(),
          body({ isStatic: true }),
          "level",
        ]);

        // ===== FLAGGAN =====
        // Vi bygger flaggan av flera delar: en stång, en vit bakgrund,
        // svarta schackrutor och en osynlig hitbox som triggar målet

        // Flaggans Y-position räknas från botten — samma höjd som plattform 6
        const flagY = height() - 670;

        // Flagstången — smal mörk pinne
        add([
          rect(4, 60),
          pos(580 + offsetX, flagY),
          color(80, 60, 40),
          "level",
        ]);

        // Flaggans vita bakgrund — där rutorna ska målas
        add([
          rect(40, 20),
          pos(584 + offsetX, flagY),
          color(255, 255, 255),
          "level",
        ]);

        // Schackrutigt mönster — 4 kolumner × 2 rader, fyll varannan ruta svart
        const squareSize = 10;
        for (let row = 0; row < 2; row++) {
          for (let col = 0; col < 4; col++) {
            // Om summan av rad och kolumn är jämn — måla rutan svart
            if ((row + col) % 2 === 0) {
              add([
                rect(squareSize, squareSize),
                pos(584 + offsetX + col * squareSize, flagY + row * squareSize),
                color(0, 0, 0),
                "level",
              ]);
            }
          }
        }

        // Osynlig hitbox som triggar målet när spelaren krockar
        add([
          rect(44, 60),       // täcker stång + flagga
          pos(580 + offsetX, flagY),
          opacity(0),         // helt genomskinlig
          area(),
          "goal",
          "level",
        ]);
      }

      // Bygg om hela banan när fönstret ändrar storlek så marken alltid
      // täcker hela bredden och plattformarna sitter rätt mot nya botten.
      function rebuildLevelOnResize() {
        onResize(() => {
          destroyAll("level");
          buildLevel();
        });
      }


      // ===== STARTSKÄRMEN =====
      scene("start", () => {
        // Nollställ kameran (ifall vi kom hit efter en zoomad in-vinst)
        camPos(width() / 2, height() / 2);
        camScale(1);

        // Bygg startskärmens egna dekorationer (streckgubbe, mörker, text).
        // De får taggen "start-decor" så vi kan riva och bygga om dem när
        // fönstret ändrar storlek — då följer mörkret med över hela ytan.
        function buildStartDecor() {
          // En "fryst" streckgubbe på startpositionen (följer centreringen)
          const startX = 20 + levelOffsetX();
          const startY = height() - 40 - 60;
          add([circle(8), pos(startX + 15, startY + 8), color(0, 0, 0), anchor("center"), "start-decor"]);
          add([rect(4, 16), pos(startX + 13, startY + 16), color(0, 0, 0), "start-decor"]);
          add([rect(3, 14), pos(startX + 12, startY + 18), color(0, 0, 0), "start-decor"]);   // vänster arm
          add([rect(3, 14), pos(startX + 18, startY + 18), color(0, 0, 0), "start-decor"]);   // höger arm
          add([rect(3, 28), pos(startX + 12, startY + 32), color(0, 0, 0), "start-decor"]);   // vänster ben
          add([rect(3, 28), pos(startX + 18, startY + 32), color(0, 0, 0), "start-decor"]);   // höger ben

          // Mörk halvgenomskinlig täckning över hela fönstret
          add([
            rect(width(), height()),
            pos(0, 0),
            color(0, 0, 0),
            opacity(0.5),
            "start-decor",
          ]);

          // Klicka-för-att-starta-texten
          add([
            text("Klicka för att starta!", { size: 50 }),
            pos(center()),
            anchor("center"),
            color(255, 255, 255),
            outline(4, rgb(0, 0, 0)),
            "start-decor",
          ]);
        }

        // Bygg upp banan + startskärmens dekor
        buildLevel();
        buildStartDecor();

        // När fönstret ändrar storlek: riv och bygg om båda lagren
        onResize(() => {
          destroyAll("level");
          destroyAll("start-decor");
          buildLevel();
          buildStartDecor();
        });

        // När man klickar — gå till spelet
        onClick(() => {
          go("game");
        });
      });


      // ===== SJÄLVA SPELET =====
      scene("game", () => {
        // Bygg upp banan
        buildLevel();
        rebuildLevelOnResize();

        // Spelaren — osynlig hitbox (där fysiken sitter)
        const player = add([
          rect(30, 60),
          pos(20 + levelOffsetX(), height() - 40 - 60),   // startar vid banans vänsterkant
          opacity(0),                                      // helt genomskinlig
          area(),
          body(),
        ]);

        // Streckgubben — kroppsdelar som hänger fast på spelaren
        // (deras position räknas från spelarens övre vänstra hörn)
        player.add([
          circle(8),
          pos(15, 8),
          color(0, 0, 0),
          anchor("center"),
        ]);                                                       // huvud
        player.add([rect(4, 16), pos(13, 16), color(0, 0, 0)]);  // kropp

        // Armar och ben sparas i variabler så vi kan animera dem.
        // anchor("top") gör att de "hänger" från sin överkant — som de vore
        // fästa i axeln/höften — så att rotate() svänger dem därifrån.
        const leftArm = player.add([
          rect(3, 14), pos(12, 18), anchor("top"), color(0, 0, 0), rotate(0),
        ]);
        const rightArm = player.add([
          rect(3, 14), pos(18, 18), anchor("top"), color(0, 0, 0), rotate(0),
        ]);
        const leftLeg = player.add([
          rect(3, 28), pos(12, 32), anchor("top"), color(0, 0, 0), rotate(0),
        ]);
        const rightLeg = player.add([
          rect(3, 28), pos(18, 32), anchor("top"), color(0, 0, 0), rotate(0),
        ]);

        // Animering — körs varje frame
        onUpdate(() => {
          const isMoving = isKeyDown("left") || isKeyDown("right");
          const inAir = !player.isGrounded();

          if (isDancing) {
            // Dansa: armar slänger upp och vinkar, ben sparkar i takt
            const t = time() * 8;
            leftArm.angle = 180 - 50 * Math.sin(t);
            rightArm.angle = -180 + 50 * Math.sin(t);
            leftLeg.angle = Math.sin(t * 1.5) * 30;
            rightLeg.angle = -Math.sin(t * 1.5) * 30;
          } else if (inAir) {
            // Hoppa: armarna upp, benen lite isär
            leftArm.angle = -150;
            rightArm.angle = 150;
            leftLeg.angle = -15;
            rightLeg.angle = 15;
          } else if (isMoving) {
            // Springa: armar och ben svänger i takt (sinusvåg)
            const swing = Math.sin(time() * 14) * 35;
            leftLeg.angle = swing;
            rightLeg.angle = -swing;
            leftArm.angle = -swing;    // armar svänger motsatt sitt eget ben
            rightArm.angle = swing;
          } else {
            // Stå still: allt rakt
            leftArm.angle = 0;
            rightArm.angle = 0;
            leftLeg.angle = 0;
            rightLeg.angle = 0;
          }
        });

        // Kom ihåg om vi redan vunnit (så konfettin bara smäller en gång)
        let hasWon = false;
        let isDancing = false;

        // ===== TIMER OCH REKORD =====
        // Läs sparat rekord från webbläsarens minne (eller null om inget sparats än)
        // try/catch: i en sandboxad förhandsvisning är localStorage blockerat
        let savedRecord = null;
        try {
          savedRecord = localStorage.getItem("jubbyRecord");
        } catch (e) {}
        const bestTime = savedRecord ? parseFloat(savedRecord) : null;

        let gameTime = 0;          // hur länge spelet pågått (sekunder)
        let timerRunning = false;  // false under nedräkningen, true när man får springa

        // Tids-skylten uppe till vänster
        const timerLabel = add([
          text("Tid: 0.00", { size: 28 }),
          pos(10, 10),
          color(255, 255, 255),
          outline(3, rgb(0, 0, 0)),
        ]);

        // Rekord-skylten under tiden
        const recordLabel = add([
          text("Rekord: " + (bestTime !== null ? bestTime.toFixed(2) : "—"), { size: 28 }),
          pos(10, 45),
          color(255, 255, 255),
          outline(3, rgb(0, 0, 0)),
        ]);

        // Räkna upp tiden varje "tick" (när Kaboom uppdaterar skärmen)
        onUpdate(() => {
          if (timerRunning) {
            gameTime += dt();                                // dt = tid sedan förra ticken
            timerLabel.text = "Tid: " + gameTime.toFixed(2); // visa med 2 decimaler
          }
        });

        // När spelaren krockar med flaggan...
        player.onCollide("goal", () => {
          if (hasWon) return;
          hasWon = true;
          timerRunning = false;   // stoppa klockan

          // Är det ett nytt rekord?
          if (bestTime === null || gameTime < bestTime) {
            // try/catch: i en sandboxad förhandsvisning är localStorage blockerat
            try {
              localStorage.setItem("jubbyRecord", gameTime.toString());
            } catch (e) {}
            recordLabel.text = "Rekord: " + gameTime.toFixed(2);
          }

          // Stor text ovanför spelaren (där kameran zoomar in)
          add([
            text("Du klara det!", { size: 50 }),
            pos(player.pos.x + 15, player.pos.y - 30),
            anchor("center"),
            color(255, 255, 255),
            outline(6, rgb(0, 0, 0)),
          ]);

          // Spela upp applåden
          play("applause");

          // Konfetti — 80 små färgade fyrkanter som flyger åt slumpmässiga håll
          // (lite långsammare så de hinner synas i in-zoomningen)
          for (let i = 0; i < 80; i++) {
            add([
              rect(8, 8),
              pos(player.pos.x + 15, player.pos.y + 30),
              color(rand(0, 255), rand(0, 255), rand(0, 255)),
              rotate(rand(0, 360)),
              move(rand(0, 360), rand(60, 180)),
              lifespan(2.5, { fade: 0.8 }),
            ]);
          }

          // Starta dansen och zooma in på spelaren
          isDancing = true;
          camPos(player.pos.x + 15, player.pos.y + 30);  // mitt på spelaren
          camScale(1.8);                                 // 1,8 gånger närmare

          // Vänta 7 sekunder och gå tillbaka till startskärmen
          wait(7, () => {
            go("start");
          });
        });

        // Hur snabbt spelaren går (pixlar per sekund)
        const SPEED = 300;

        // ===== NEDRÄKNING =====
        // Visa "Klara... Färdiga... GÅÅ!" innan styrningen aktiveras
        const countdownLabel = add([
          text("Klara...", { size: 80 }),
          pos(center()),
          anchor("center"),
          color(255, 255, 255),
          outline(6, rgb(0, 0, 0)),
        ]);

        // Efter 1 sekund: byt text till "Färdiga..."
        wait(1, () => {
          countdownLabel.text = "Färdiga...";
        });

        // Efter 2 sekunder: byt text till "HOPPA!"
        wait(2, () => {
          countdownLabel.text = "HOPPA!";
        });

        // Mobilknappar: två flaggor som säger om vänster/höger trycks just nu.
        // De sätts till true när fingret rör knappen och false när det släpper.
        let touchLeft = false;
        let touchRight = false;

        // Hjälp-funktion: koppla en knapp till en flagga.
        // pointerdown = finger ner, pointerup/cancel/leave = finger upp/utanför.
        function bindHoldButton(id, setState) {
          const btn = document.getElementById(id);
          if (!btn) return;
          const start = (e) => { e.preventDefault(); setState(true); };
          const end   = (e) => { e.preventDefault(); setState(false); };
          btn.addEventListener("pointerdown", start);
          btn.addEventListener("pointerup", end);
          btn.addEventListener("pointercancel", end);
          btn.addEventListener("pointerleave", end);
        }

        bindHoldButton("btn-left",  v => touchLeft = v);
        bindHoldButton("btn-right", v => touchRight = v);

        // Efter 3 sekunder: ta bort texten, starta klockan och slå på styrningen
        wait(3, () => {
          destroy(countdownLabel);
          timerRunning = true;

          // När vänsterpilen hålls nere — flytta åt vänster
          onKeyDown("left", () => {
            player.move(-SPEED, 0);
          });

          // När högerpilen hålls nere — flytta åt höger
          onKeyDown("right", () => {
            player.move(SPEED, 0);
          });

          // När mellanslag trycks ned — hoppa, men bara om vi står på marken
          onKeyPress("space", () => {
            if (player.isGrounded()) {
              player.jump(500);
            }
          });

          // När uppåtpilen trycks ned — hoppa, men bara om vi står på marken
          onKeyPress("up", () => {
            if (player.isGrounded()) {
              player.jump(500);
            }
          });

          // Mobilknapparna: läs flaggorna varje frame och flytta spelaren
          onUpdate(() => {
            if (touchLeft)  player.move(-SPEED, 0);
            if (touchRight) player.move(SPEED, 0);
          });

          // Hopp-knappen: ett tryck = ett hopp (om vi står på marken)
          const jumpBtn = document.getElementById("btn-jump");
          if (jumpBtn) {
            jumpBtn.addEventListener("pointerdown", (e) => {
              e.preventDefault();
              if (player.isGrounded()) {
                player.jump(500);
              }
            });
          }
        });
      });


      // Starta spelet på startskärmen
      go("start");
    </script>
  </body>
</html>
